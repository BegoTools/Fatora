<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#003462" />
    <meta name="description" content="Easy Store - Professional Retail ERP System for Inventory, Sales, Purchases, Treasury, HR and Reporting" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Easy Store ERP</title>
    <style>
      /* Critical CSS for loading state */
      body { margin: 0; background: #f7f9fb; font-family: 'IBM Plex Sans Arabic', sans-serif; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; }
      #loading-spinner { width: 40px; height: 40px; border: 3px solid #c2c7d1; border-top-color: #00355f; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading"><div id="loading-spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
